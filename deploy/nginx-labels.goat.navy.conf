# nginx server block for labels.goat.navy — dev/build phase.
#
# Proxies to 127.0.0.1:14831, which is NOT a local labeler server on this
# box -- it's the far end of an autossh reverse tunnel from the GPU
# machine (see labeler-tunnel.service). The labeler server itself runs on
# the GPU box; this cloud host only relays public traffic to it.
#
# This is HTTP-only on purpose. Once DNS for labels.goat.navy resolves
# here, run:
#   sudo certbot --nginx -d labels.goat.navy
# and certbot will rewrite this file to add a matching HTTPS server block
# (with the Let's Encrypt cert paths) and an HTTP -> HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name labels.goat.navy;

    location / {
        proxy_pass http://127.0.0.1:14831;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # subscribeLabels is a long-lived SSE stream. Without these, nginx
        # buffers the proxied response and events never arrive in real
        # time -- the connection looks alive but delivers nothing until
        # the buffer fills or the client disconnects.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }
}
