# nginx server block for label.goat.navy — dev/build phase.
#
# Proxies to 127.0.0.1:14831, which is NOT a local labeler server on this
# box -- it's the far end of an autossh reverse tunnel from the GPU
# machine (see labeler-tunnel.service). The labeler server itself runs on
# the GPU box; this cloud host only relays public traffic to it.
#
# subscribeLabels is a real WebSocket (com.atproto.label.subscribeLabels),
# not SSE as originally assumed here -- confirmed empirically (HTTP 101
# Switching Protocols, binary DAG-CBOR frames). The `map` below lets one
# location block correctly handle both plain HTTP (queryLabels) and the
# WebSocket upgrade (subscribeLabels): $http_upgrade is empty for a normal
# request, so $connection_upgrade resolves to "close"; when a client sends
# `Upgrade: websocket`, it resolves to "upgrade" and the handshake passes
# through untouched. A blanket `proxy_set_header Connection '';` (the
# original version of this file) strips the header the upgrade needs and
# breaks subscribeLabels outright -- confirmed by testing, not assumed.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name label.goat.navy;

    location / {
        proxy_pass http://127.0.0.1:14831;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # subscribeLabels is long-lived. Without these, nginx buffers the
        # proxied response and/or times out a connection meant to stay
        # open indefinitely.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
    }
}
